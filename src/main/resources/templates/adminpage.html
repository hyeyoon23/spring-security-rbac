<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>관리자 페이지</title>
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>

    <div style="max-width: 600px; margin: 80px auto; padding: 30px; border: 1px solid #ddd; border-radius: 8px;">
        <h2 style="text-align: center; margin-bottom: 25px;">관리자 페이지 - 전체 사용자 목록</h2>

        <table style="width: 100%; border-collapse: collapse;">
            <thead>
                <tr style="background-color: #343a40; color: white;">
                    <th style="padding: 12px; text-align: center;">ID</th>
                    <th style="padding: 12px; text-align: center;">Username</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="user : ${users}" style="border-bottom: 1px solid #ddd;">
                    <td style="padding: 12px; text-align: center;" th:text="${user.id}"></td>
                    <td style="padding: 12px; text-align: center;" th:text="${user.username}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
