<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>

    <div style="max-width: 400px; margin: 80px auto; padding: 30px; border: 1px solid #ddd; border-radius: 8px;">
        <h2 style="text-align: center; margin-bottom: 25px;">로그인</h2>

        <div th:if="${param.error}" style="color: red; text-align: center; margin-bottom: 15px;">
            아이디 또는 비밀번호가 올바르지 않습니다.
        </div>
        <div th:if="${param.logout}" style="color: green; text-align: center; margin-bottom: 15px;">
            로그아웃 되었습니다.
        </div>

        <form th:action="@{/auth/login}" method="post">
            <div style="margin-bottom: 15px;">
                <label for="username" style="display: block; margin-bottom: 5px; font-weight: bold;">아이디</label>
                <input type="text" id="username" name="username" required
                       style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
            </div>
            <div style="margin-bottom: 20px;">
                <label for="password" style="display: block; margin-bottom: 5px; font-weight: bold;">비밀번호</label>
                <input type="password" id="password" name="password" required
                       style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
            </div>
            <button type="submit"
                    style="width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer;">
                로그인
            </button>
        </form>

        <p style="text-align: center; margin-top: 15px;">
            계정이 없으신가요? <a th:href="@{/signin}" style="color: #007bff;">회원가입</a>
        </p>
    </div>
</body>
</html>
