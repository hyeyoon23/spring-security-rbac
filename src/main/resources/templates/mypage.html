<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>마이페이지</title>
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>

    <div style="max-width: 500px; margin: 80px auto; padding: 30px; border: 1px solid #ddd; border-radius: 8px;">
        <h2 style="text-align: center; margin-bottom: 25px;">마이페이지</h2>

        <table style="width: 100%; border-collapse: collapse;">
            <tr>
                <th style="text-align: left; padding: 12px; border-bottom: 1px solid #ddd; background-color: #f8f9fa;">Username</th>
                <td style="padding: 12px; border-bottom: 1px solid #ddd;" th:text="${user.username}"></td>
            </tr>
            <tr>
                <th style="text-align: left; padding: 12px; border-bottom: 1px solid #ddd; background-color: #f8f9fa;">Position</th>
                <td style="padding: 12px; border-bottom: 1px solid #ddd;" th:text="${user.position}"></td>
            </tr>
        </table>
    </div>
</body>
</html>
