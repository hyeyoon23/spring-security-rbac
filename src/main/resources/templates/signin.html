<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>

    <div style="max-width: 400px; margin: 80px auto; padding: 30px; border: 1px solid #ddd; border-radius: 8px;">
        <h2 style="text-align: center; margin-bottom: 25px;">회원가입</h2>

        <form th:action="@{/auth/signin}" method="post">
            <div style="margin-bottom: 15px;">
                <label for="username" style="display: block; margin-bottom: 5px; font-weight: bold;">아이디</label>
                <input type="text" id="username" name="username" required
                       style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
            </div>
            <div style="margin-bottom: 15px;">
                <label for="password" style="display: block; margin-bottom: 5px; font-weight: bold;">비밀번호</label>
                <input type="password" id="password" name="password" required
                       style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
            </div>
            <div style="margin-bottom: 15px;">
                <label for="position" style="display: block; margin-bottom: 5px; font-weight: bold;">직책</label>
                <input type="text" id="position" name="position" required
                       style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
            </div>
            <div style="margin-bottom: 20px;">
                <label for="authority" style="display: block; margin-bottom: 5px; font-weight: bold;">권한</label>
                <select id="authority" name="authority" required
                        style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
                    <option value="ROLE_USER">일반 사용자 (USER)</option>
                    <option value="ROLE_ADMIN">관리자 (ADMIN)</option>
                </select>
            </div>
            <button type="submit"
                    style="width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer;">
                회원가입
            </button>
        </form>

        <p style="text-align: center; margin-top: 15px;">
            이미 계정이 있으신가요? <a th:href="@{/login}" style="color: #007bff;">로그인</a>
        </p>
    </div>
</body>
</html>
